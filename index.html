<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubbles🫧</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: pink;
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .card {
      background: #ffe6f0;
      width: 95%;
      max-width: 500px;
      padding: 40px 30px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 10px 50px rgba(255, 79, 154, 0.25);
      position: relative;
    }
    .heart {
      font-size: 45px;
      animation: heartbeat 1s infinite;
    }
    h1 {
      color: #ff4f9a;
      margin: 10px 0;
    }
    h2 {
      color: #333;
      margin-top: 25px;
    }
    p {
      color: #444;
      font-size: 17px;
      line-height: 1.5;
    }
    .button-container {
      margin-top: 25px;
    }
    button {
      border: none;
      padding: 13px 28px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      margin: 10px;
    }
    #yesBtn {
      background: #ff4f9a;
      color: white;
    }
    #yesBtn:hover {
      transform: scale(1.1);
      background: #ff2f86;
    }
    #noBtn {
      background: #ff2f86;
      color: #999;
      position: absolute;
    }
    #smallText {
      font-size: 14px;
      color: #999;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }
    .balloon {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 60px;
      background: #ff4f9a;
      border-radius: 50% 50% 50% 50%;
      animation: float 8s infinite ease-in;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-120vh); }
    }
  </style>
</head>
<body>
  <div class="card" id="mainCard">
    <div class="heart">❤️</div>
    <h1>Hey Pretty🥹</h1>
    <p id="message">
      Since the first time I saw you, I’ve been crushing on you and since this is a website, I guess it was love at first site🫠😝
    </p>
    <h2>Wanna hangout with me?</h2>
    <div class="button-container">
      <button id="yesBtn">Yes🫠</button>
      <button id="noBtn">No😭</button>
    </div>
    <p id="smallText">Remember, I’m chill before you pick No😭</p>
  </div>
  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const smallText = document.getElementById('smallText');
    let noCount = 0;
    function moveNoButton() {
      noCount++;
      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;
      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);
      noBtn.style.position = 'fixed';
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
      if (noCount === 1) smallText.textContent = "Why rush to say No😭";
      else if (noCount === 2) smallText.textContent = "Please gimme a chance😭";
      else if (noCount === 3) smallText.textContent = "I promise I’ll make you happy🥹";
    }
    noBtn.addEventListener('mouseover', moveNoButton);
    noBtn.addEventListener('touchstart', moveNoButton);
    yesBtn.addEventListener('click', () => {
      document.body.innerHTML = `
        <div class="card">
          <div class="heart">❤️</div>
          <h1>Yay!🥹</h1>
          <p id="message">I’m so happy you said yes! Let’s stay connected 🥰</p>
          <h2>Choose one:</h2>
          <div class="button-container">
            <a href="https://wa.me/233539265094" target="_blank">
              <button style="background:#25D366;color:white;">WhatsApp</button>
            </a>
            <a href="https://www.snapchat.com/add/nyr_slime" target="_blank">
              <button style="background:#FFFC00;color:black;">Snapchat</button>
            </a>
          </div>
        </div>
      `;
      for (let i = 0; i < 10; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.style.left = Math.random() * window.innerWidth + 'px';
        balloon.style.background = i % 2 === 0 ? '#ff4f9a' : '#ffb6c1';
        balloon.style.animationDuration = (6 + Math.random() * 4) + 's';
        document.body.appendChild(balloon);
      }
    });
  </script>
</body>
</html>
